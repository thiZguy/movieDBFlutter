name: tmdb_app
description: "Flutter Technical Test - Equifax. Películas y series con TheMovieDB API."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management + DI
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Modelos inmutables + JSON
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.6.2

  # Imágenes con cache
  cached_network_image: ^3.4.1

  # Variables de entorno
  flutter_dotenv: ^5.2.1

  # Formato de fechas
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Mocking en tests
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - .env
